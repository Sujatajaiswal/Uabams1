# Render Blueprint - deploys backend (web service), Postgres, and frontend
# (static site) in one go via "New + Blueprint" on https://dashboard.render.com
# pointing at this repo. See README.md "Deploying to Render" for the manual
# click-through steps if you'd rather not use a Blueprint.

databases:
  - name: uabams-db
    plan: free
    databaseName: uabams
    user: uabams

services:
  - type: web
    name: uabams-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uabams-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: SEED_ON_STARTUP
        value: "true"
      - key: DEFAULT_SAMPLING_RATE
        value: "2500"
      - key: GATEWAY_OFFLINE_AFTER_SECONDS
        value: "300"

  - type: web
    name: uabams-frontend
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        value: https://uabams-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
